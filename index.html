<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぷち滝行まっぷ - 地図掲示板</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.7.0/firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.7.0/auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic",sans-serif;overflow:hidden;height:100vh;width:100vw;background:#1a2e1a;color:#f0f0e8}
#map{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

/* ヘッダー */
#header{position:absolute;top:0;left:0;right:0;z-index:1000;background:linear-gradient(180deg,rgba(26,46,26,0.92) 0%,rgba(26,46,26,0.6) 75%,transparent 100%);padding:14px 20px 28px;pointer-events:none}
#header h1{font-size:1.3em;color:#c8e6c9;text-shadow:0 2px 6px rgba(0,0,0,0.7);letter-spacing:0.08em;pointer-events:auto;display:inline-block}
#header .subtitle{font-size:0.72em;color:#8db88d;margin-top:2px;opacity:0.8}

/* 現在地ボタン */
#locateBtn{position:absolute;top:14px;right:20px;z-index:1100;background:rgba(255,255,255,0.92);border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:0.78em;font-weight:bold;color:#2d4a2d;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;gap:5px;transition:all 0.2s}
#locateBtn:hover{background:#fff;transform:scale(1.05)}
#locateBtn:disabled{opacity:0.6;cursor:wait}

/* 投稿一覧パネル */
#postsPanel{position:absolute;bottom:0;left:0;width:380px;max-height:55vh;z-index:1000;background:rgba(20,35,20,0.94);border-radius:0 16px 0 0;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-bottom:none;border-left:none;display:flex;flex-direction:column;overflow:hidden;transition:transform 0.3s}
#postsPanel.collapsed{transform:translateY(calc(100% - 42px))}
#postsPanel h2{font-size:0.88em;color:#8db88d;padding:12px 16px 8px;font-weight:bold;letter-spacing:0.05em;border-bottom:1px solid rgba(141,184,141,0.2);flex-shrink:0;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
#postsPanel h2::after{content:'▼';font-size:0.7em;transition:transform 0.3s}
#postsPanel.collapsed h2::after{transform:rotate(180deg)}
#postsList{overflow-y:auto;flex:1;padding:8px 12px 12px}
#postsList::-webkit-scrollbar{width:4px}
#postsList::-webkit-scrollbar-thumb{background:rgba(141,184,141,0.3);border-radius:2px}

.post-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px;margin-bottom:6px;transition:background 0.2s;cursor:pointer}
.post-card:hover{background:rgba(255,255,255,0.1)}
.post-card.active{background:rgba(74,122,74,0.25);border-color:rgba(74,154,74,0.4)}
.post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.post-name{font-weight:bold;color:#c8e6c9;font-size:0.82em}
.post-date{font-size:0.68em;color:#6a8a6a}
.post-comment{color:#d0d8d0;line-height:1.4;font-size:0.82em;white-space:pre-wrap;word-break:break-word;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.post-coords{font-size:0.68em;color:#5a8a7a;margin-top:5px;opacity:0.7}
.post-actions{margin-top:5px;display:flex;gap:6px}
.post-btn{background:none;border:1px solid #4a7a4a;color:#6a9a6a;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:0.68em;transition:all 0.2s}
.post-btn:hover{background:rgba(74,122,74,0.2)}
.post-btn-del{border-color:#7a4a4a;color:#9a6a6a}
.post-btn-del:hover{background:rgba(122,74,74,0.2)}
.empty-msg{text-align:center;color:#6a8a6a;padding:30px 10px;font-size:0.84em;line-height:1.5}

/* 投稿フォーム */
#formPanel{position:absolute;bottom:0;right:0;width:360px;z-index:1000;background:rgba(20,35,20,0.94);border-radius:16px 0 0 0;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-bottom:none;border-right:none;padding:16px;transition:transform 0.3s}
#formPanel h2{font-size:0.88em;color:#c8e6c9;margin-bottom:8px;font-weight:bold}
#formPanel label{display:block;font-size:0.72em;color:#8db88d;margin-bottom:2px;font-weight:bold}
#formPanel input,#formPanel textarea{width:100%;padding:7px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.4);color:#f0f0e8;font-size:0.85em;outline:none;font-family:inherit}
#formPanel input:focus,#formPanel textarea:focus{border-color:#5b9a5b}
#formPanel textarea{min-height:55px;resize:none}
.form-status{font-size:0.7em;color:#8a9a6a;margin-bottom:6px;min-height:1.2em;line-height:1.3}
.form-status.ok{color:#6a9a6a}
.form-status.err{color:#9a6a6a}
.form-actions{display:flex;justify-content:flex-end;gap:8px}
.btn{background:linear-gradient(135deg,#3a7c3a,#4a9a4a);color:white;border:none;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:0.82em;font-weight:bold;transition:all 0.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(74,154,74,0.4)}
.btn-secondary{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#aaa}

/* Leafletオーバーライド */
.leaflet-popup-content-wrapper{background:rgba(20,35,20,0.95);color:#f0f0e8;border-radius:10px;border:1px solid rgba(255,255,255,0.15)}
.leaflet-popup-tip{background:rgba(20,35,20,0.95)}
.leaflet-popup-close-button{color:#8db88d}
.leaflet-control-zoom a{background:rgba(20,35,20,0.9)!important;color:#c8e6c9!important;border-color:rgba(255,255,255,0.15)!important}
.leaflet-control-zoom a:hover{background:rgba(40,60,40,0.95)!important}

/* マーカー */
.marker-pin{width:20px;height:20px;background:#5b9a5b;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.marker-pin-main{width:14px;height:14px;background:#c4956a;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(196,149,106,0.5)}
.marker-my{width:16px;height:16px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(66,133,244,0.25)}

/* レスポンシブ */
@media(max-width:768px){
  #postsPanel{width:100%;max-height:40vh}
  #formPanel{width:100%;border-radius:16px 0 0 0}
  #header{padding:10px 14px 20px}
  #header h1{font-size:1.1em}
}
</style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <h1>🏔️ ぷち滝行まっぷ</h1>
  <div class="subtitle">〜 地図に滝行の足跡を刻む 〜</div>
</div>

<button id="locateBtn" onclick="locateMe()">📍 現在地</button>

<div id="postsPanel">
  <h2 onclick="togglePosts()">みんなの投稿 (<span id="postCount">0</span>)</h2>
  <div id="postsList"><div class="loading"><span class="spinner"></span>読み込み中...</div></div>
</div>

<div id="formPanel">
  <h2>📝 新しい投稿</h2>
  <label>名前</label>
  <input id="name" type="text" placeholder="山伏 太郎" style="margin-bottom:8px">
  <label>コメント</label>
  <textarea id="comment" placeholder="この場所で感じたことを共有..." style="margin-bottom:6px"></textarea>
  <div class="form-status" id="formStatus">🗺️ 地図をクリックして位置を選択</div>
  <input type="hidden" id="lat" value="">
  <input type="hidden" id="lng" value="">
  <div class="form-actions">
    <button class="btn-secondary" onclick="resetForm()">クリア</button>
    <button class="btn" onclick="submitPost()">投稿する</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_FKEbaBGIhNJCBdOFqNE3QhFez1KSfzk",
  authDomain: "takigiri-bbs.firebaseapp.com",
  projectId: "takigiri-bbs",
  storageBucket: "takigiri-bbs.firebasestorage.app",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef123456"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let currentUser = null;
firebase.auth().signInAnonymously().catch(()=>{});

const $ = s => document.querySelector(s);

let map;
let markers = {};
let posts = [];
let currentLat = null, currentLng = null;
let selectedMarker = null;
let myLocationMarker = null;

const pinIcon = L.divIcon({ className: '', html: '<div class="marker-pin"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });
const mainIcon = L.divIcon({ className: '', html: '<div class="marker-pin-main"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });
const myIcon = L.divIcon({ className: '', html: '<div class="marker-my"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });

function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: true })
    .setView([35.3606, 138.7274], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  map.on('click', (e) => {
    currentLat = e.latlng.lat;
    currentLng = e.latlng.lng;
    if (selectedMarker) map.removeLayer(selectedMarker);
    selectedMarker = L.marker([currentLat, currentLng], { icon: mainIcon }).addTo(map);
    $('#formStatus').textContent = '📍 ' + currentLat.toFixed(5) + ', ' + currentLng.toFixed(5) + ' に投稿';
    $('#formStatus').className = 'form-status ok';
  });

  loadPosts();
}

async function loadPosts() {
  const container = $('#postsList');
  container.innerHTML = '<div class="loading"><span class="spinner"></span>読み込み中...</div>';
  try {
    db.collection('posts').orderBy('created_at', 'desc').onSnapshot(snapshot => {
      posts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPosts();
      dropMarkers();
      $('#postCount').textContent = posts.length;
    }, err => {
      container.innerHTML = '<div class="empty-msg">読み込みエラー<br>' + err.message + '</div>';
    });
  } catch(e) {
    container.innerHTML = '<div class="empty-msg">読み込みエラー<br>' + e.message + '</div>';
  }
}

function renderPosts() {
  const container = $('#postsList');
  if (posts.length === 0) {
    container.innerHTML = '<div class="empty-msg">まだ投稿がありません<br>地図をクリックして最初の投稿を 🌊</div>';
    return;
  }
  container.innerHTML = posts.map(p => {
    const hasCoords = p.lat != null && p.lng != null;
    return '<div class="post-card" id="card-' + p.id + '" onclick="focusLocation(\'' + p.id + '\')">' +
      '<div class="post-header">' +
        '<span class="post-name">🌿 ' + escHtml(p.name) + '</span>' +
        '<span class="post-date">' + (p.created_at || '') + '</span>' +
      '</div>' +
      '<div class="post-comment">' + escHtml(p.comment) + '</div>' +
      (hasCoords ? '<div class="post-coords">📍 ' + Number(p.lat).toFixed(4) + ', ' + Number(p.lng).toFixed(4) + '</div>' : '') +
      '<div class="post-actions">' +
        (hasCoords ? '<button class="post-btn" onclick="event.stopPropagation();panTo(\'' + p.id + '\')">📍 ここへ</button>' : '') +
        '<button class="post-btn post-btn-del" onclick="event.stopPropagation();deletePost(\'' + p.id + '\')">削除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function dropPosts() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  let bounds = [];
  posts.forEach(p => {
    if (p.lat == null || p.lng == null) return;
    const marker = L.marker([p.lat, p.lng], { icon: pinIcon })
      .addTo(map)
      .bindPopup('<div style="min-width:160px">' +
        '<div style="font-weight:bold;margin-bottom:4px;color:#2d4a2d">🌿 ' + escHtml(p.name) + '</div>' +
        '<div style="font-size:0.85em;line-height:1.4">' + escHtml(p.comment) + '</div>' +
        '<div style="font-size:0.72em;color:#777;margin-top:6px">' + (p.created_at || '') + '</div>' +
      '</div>');
    marker.on('click', () => highlightCard(p.id));
    markers[p.id] = marker;
    bounds.push([p.lat, p.lng]);
  });
  if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50] });
}

function panTo(id) {
  const p = posts.find(x => x.id === id);
  if (!p || p.lat == null) return;
  map.setView([p.lat, p.lng], 15);
  const m = markers[id];
  if (m) { m.openPopup(); highlightCard(id); }
}

function focusLocation(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  if (p.lat != null) panTo(id);
  highlightCard(id);
}

function highlightCard(id) {
  document.querySelectorAll('.post-card').forEach(c => c.classList.remove('active'));
  const card = $('#card-' + id);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

async function submitPost() {
  const name = $('#name').value.trim();
  const comment = $('#comment').value.trim();
  if (!name || !comment) { alert('名前とコメントは必須です'); return; }
  if (currentLat == null) { alert('地図をクリックして位置を選択してください'); return; }
  await db.collection('posts').add({
    name, comment,
    lat: currentLat, lng: currentLng,
    created_at: new Date().toISOString()
  });
  $('#name').value = '';
  $('#comment').value = '';
  resetForm();
}

async function deletePost(id) {
  if (!confirm('この投稿を削除しますか？')) return;
  await db.collection('posts').doc(id).delete();
}

function resetForm() {
  $('#name').value = '';
  $('#comment').value = '';
  $('#lat').value = '';
  $('#lng').value = '';
  currentLat = null; currentLng = null;
  if (selectedMarker) { map.removeLayer(selectedMarker); selectedMarker = null; }
  $('#formStatus').textContent = '🗺️ 地図をクリックして位置を選択';
  $('#formStatus').className = 'form-status';
}

function togglePosts() {
  $('#postsPanel').classList.toggle('collapsed');
}

function locateMe() {
  if (!navigator.geolocation) { alert('このブラウザは位置情報に対応していません'); return; }
  const btn = $('#locateBtn');
  btn.disabled = true;
  btn.textContent = '📍 取得中...';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      if (myLocationMarker) map.removeLayer(myLocationMarker);
      myLocationMarker = L.marker([lat, lng], { icon: myIcon }).addTo(map).bindPopup('現在地');
      map.setView([lat, lng], 14);
      currentLat = lat;
      currentLng = lng;
      if (selectedMarker) map.removeLayer(selectedMarker);
      selectedMarker = L.marker([lat, lng], { icon: mainIcon }).addTo(map);
      $('#formStatus').textContent = '📍 ' + lat.toFixed(5) + ', ' + lng.toFixed(5) + ' に投稿（現在地）';
      $('#formStatus').className = 'form-status ok';
      btn.disabled = false;
      btn.textContent = '📍 現在地';
    },
    (err) => {
      alert('位置情報を取得できません: ' + err.message);
      btn.disabled = false;
      btn.textContent = '📍 現在地';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('DOMContentLoaded', initMap);
</script>
</body>
</html>
